<script>
// ─── CONFIG ───────────────────────────────────────────────────────
const PUBLISHED_ID = '2PACX-1vSAXjUvGp4pAr-GqyHEqTywyfWPG71BZwGsopoFK8rgiDGTQfe6iTD-l1OFBt6fiMFyrlQNji970GiC';

const SHEETS = {
  STOCK: '852874521',
  JOURNAL: '1594820799'
};

// ✅ Stable fetch using GID
async function fetchSheet(gid) {
  const url = `https://docs.google.com/spreadsheets/d/e/${PUBLISHED_ID}/pub?output=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed to fetch');
  return res.text();
}

// ─── CHART INSTANCES ──────────────────────────────────────────────
const charts = {};

// ─── CSV PARSER ──────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field.trim()); field = ''; }
      else if (c === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') field += c;
    }
  }
  if (field || row.length) { row.push(field.trim()); rows.push(row); }
  return rows;
}

const num = s => parseFloat((s||'').replace(/[₹,\s]/g,'')) || 0;

// ─── PARSE STOCK SUMMARY ─────────────────────────────────────────
function parseStockSummary(csv) {
  const rows = parseCSV(csv);
  let totalPL = 0, date = '';
  const lots = [];
  let inLots = false;

  for (const r of rows) {
    const tpIdx = r.findIndex(c => c === 'TOTAL P/L');
    if (tpIdx >= 0) { totalPL = num(r[tpIdx+1]); date = r[tpIdx+2] || ''; }

    if (r.includes('LOT NAME') && r.includes('P/L')) { inLots = true; continue; }

    if (inLots) {
      const cells = r.filter(c => c !== '');
      if (cells.length >= 2 && cells[0] !== 'LOT NAME') {
        const pl = num(cells[1]);
        if (!isNaN(pl)) lots.push({ symbol: cells[0], pl });
      }
    }
  }
  return { totalPL, date, lots };
}

// ─── PARSE TRADING JOURNAL ───────────────────────────────────────
function parseTradingJournal(csv) {
  const rows = parseCSV(csv);
  const trades = [];
  let headerIdx = -1;
  let hMap = {};
  let aprilCapital = 0;

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];

    if (r.includes('SR NO.') && r.includes('LOT NAME')) {
      headerIdx = i;
      r.forEach((c, j) => { hMap[c.trim()] = j; });
      continue;
    }

    if (headerIdx >= 0 && r[hMap['SR NO.']] && /^\d+$/.test(r[hMap['SR NO.']])) {
      const t = {
        sr: parseInt(r[hMap['SR NO.']]) || 0,
        sector: r[hMap['SECTOR']] || 'OTHER',
        account: r[hMap['ACCOUNT NAME']] || '',
        entry_date: r[hMap['ENTRY DATE']] || '',
        symbol: r[hMap['LOT NAME']] || '',
        entry: num(r[hMap['ENTRY PRICE']]),
        qty: num(r[hMap['QUANTITY']]),
        capital: num(r[hMap['CAPITAL']]),
        exit: num(r[hMap['EXIT']]),
        pl: num(r[hMap['P/L']]),
        pl_pct: num(r[hMap['P/L%']]),
      };

      if (t.symbol && t.capital > 0) {
        trades.push(t);
        aprilCapital += t.capital;
      }
    }
  }

  return { trades, aprilCapital };
}

// ─── MERGE TRADES ───────────────────────────────────────────────
function mergeTrades(raw) {
  const map = {};
  raw.forEach(t => {
    if (!map[t.symbol]) {
      map[t.symbol] = { ...t, accounts: [t.account] };
    } else {
      const m = map[t.symbol];
      const totalQty = m.qty + t.qty;
      m.entry = (m.entry * m.qty + t.entry * t.qty) / totalQty;
      m.qty = totalQty;
      m.capital += t.capital;
      m.pl += t.pl;
      if (!m.accounts.includes(t.account)) m.accounts.push(t.account);
      m.account = m.accounts.join(' · ');
    }
  });

  return Object.values(map);
}

// ─── MAIN LOAD ───────────────────────────────────────────────────
async function loadData() {
  try {
    const summaryCSV = await fetchSheet(SHEETS.STOCK);
    const journalCSV = await fetchSheet(SHEETS.JOURNAL);

    const stockData = parseStockSummary(summaryCSV);
    const journalData = parseTradingJournal(journalCSV);

    const merged = mergeTrades(journalData.trades);

    console.log("✅ Loaded successfully");
    console.log(stockData, journalData, merged);

    document.getElementById('loading-overlay').classList.add('hidden');

  } catch (e) {
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('error-overlay').classList.remove('hidden');
    document.getElementById('error-msg').textContent = e.message;
  }
}

window.onload = loadData;

</script>
